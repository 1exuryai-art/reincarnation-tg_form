<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Анкета</title>

<style>
body {
    background: #d6d3c7;
    font-family: Arial;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
    background: #ebe7db;
    border: 2px solid #b5b0a3;
    padding: 20px;
}

h1 {
    font-size: 22px;
    margin-bottom: 10px;
}

.block {
    border: 1px solid #b5b0a3;
    padding: 15px;
    margin-bottom: 15px;
    background: #f5f2e8;
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border: 1px solid #aaa;
}

button {
    background: #3a6ea5;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #2c5b8a;
}
</style>
</head>

<body>

<div class="container">

<h1>Регистрация</h1>

<div class="block">
<label>Имя</label>
<input type="text" id="name">
</div>

<div class="block">
<label>Текущий доход ($)</label>
<input type="text" id="income">
</div>

<div class="block">
<label>Цель дохода</label>
<input type="text" id="goal">
</div>

<div class="block">
<label>Какая основная проблема?</label>
<textarea id="problem"></textarea>
</div>

<button onclick="sendData()">Отправить заявку</button>

</div>

<script>
function sendData() {
    const data = {
        name: document.getElementById('name').value,
        income: document.getElementById('income').value,
        goal: document.getElementById('goal').value,
        problem: document.getElementById('problem').value
    };

    alert("Заявка отправлена (пока тест)");

    console.log(data);
}
</script>

</body>
</html>
